<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Modified Registration Form</title>
    <style>
        /* Hide the summary table initially */
        #summaryTable {
            display: none;
            margin-top: 30px;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <h2>Student Registration</h2>
    
    <form id="regForm">
        <label for="fname">First name:</label><br>
        <input type="text" id="fname" name="first_name"><br><br>

        <label for="lname">Last name:</label><br>
        <input type="text" id="lname" name="last_name"><br><br>

        <label for="email">Email address:</label><br>
        <input type="email" id="email" name="email_address"><br><br>

        <label for="pwd">Password:</label><br>
        <input type="password" id="pwd" name="password"><br><br>

        <label for="cpwd">Confirm password:</label><br>
        <input type="password" id="cpwd" name="confirm_password"><br><br>

        <label for="age">Age:</label><br>
        <input type="number" id="age" name="age" min="1"><br><br>

        <p>Gender:</p>
        <input type="radio" id="male" name="gender" value="Male">
        <label for="male">Male</label><br>
        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label><br>
        <input type="radio" id="other" name="gender" value="Other">
        <label for="other">Other</label><br><br>

        <p>Interests:</p>
        <input type="checkbox" id="reading" name="interests" value="Reading">
        <label for="reading">Reading</label><br>
        <input type="checkbox" id="writing" name="interests" value="Writing">
        <label for="writing">Writing</label><br>
        <input type="checkbox" id="coding" name="interests" value="Coding">
        <label for="coding">Coding</label><br>
        <input type="checkbox" id="gaming" name="interests" value="Gaming">
        <label for="gaming">Gaming</label><br><br>

        <button type="button" onclick="displaySummary()">Submit and View Summary</button>
    </form>

    <hr>

    <table id="summaryTable" border="1" cellpadding="8" cellspacing="0">
        <thead>
            <tr>
                <th colspan="2">Registration Summary</th>
            </tr>
        </thead>
        <tbody id="summaryBody">
            </tbody>
    </table>

    <script>
        function displaySummary() {
            // Get the table and tbody elements
            const table = document.getElementById("summaryTable");
            const tbody = document.getElementById("summaryBody");
            
            // Clear any previous summary data
            tbody.innerHTML = "";

            // Collect basic text values
            const data = [
                { field: "First Name", value: document.getElementById("fname").value },
                { field: "Last Name", value: document.getElementById("lname").value },
                { field: "Email", value: document.getElementById("email").value },
                { field: "Age", value: document.getElementById("age").value }
            ];

            // Collect Gender (Radio Button)
            const genderSelected = document.querySelector('input[name="gender"]:checked');
            data.push({ 
                field: "Gender", 
                value: genderSelected ? genderSelected.value : "None Selected" 
            });

            // Collect Interests (Checkboxes)
            const interestsChecked = document.querySelectorAll('input[name="interests"]:checked');
            let interestsList = [];
            interestsChecked.forEach(checkbox => interestsList.push(checkbox.value));
            data.push({ 
                field: "Interests", 
                value: interestsList.length > 0 ? interestsList.join(", ") : "None Selected" 
            });

            // Build the table rows dynamically
            data.forEach(item => {
                const row = `<tr>
                                <td><strong>${item.field}</strong></td>
                                <td>${item.value}</td>
                             </tr>`;
                tbody.innerHTML += row;
            });

            // Reveal the table
            table.style.display = "table";
        }
    </script>
</body>
</html>
